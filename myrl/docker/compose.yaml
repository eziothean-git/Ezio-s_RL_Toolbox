services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: myrl/isaaclab-dev:2.3.2
    container_name: ${CONTAINER_NAME:-myrl-dev}
    # GPU (Compose v2)
    gpus: all

    # 共享宿主机网络命名空间，可直接访问 X11 socket（无需额外鉴权配置）
    network_mode: host

    # Isaac Sim/Kit 对共享内存很敏感；这俩尽量保留其一（这里两者都给，稳定优先）
    shm_size: ${SHM_SIZE:-16g}
    ipc: host

    ulimits:
      memlock: -1
      stack: 67108864

    # EULA 统一放这里，bootstrap 会生成 myrl/docker/.env（你也可以手动从 .env.example copy）
    env_file:
      - .env

    environment:
      # 你可以用这个切换逻辑（entrypoint 里读）
      MYRL_MODE: ${MYRL_MODE:-dev}
      HEADLESS: ${HEADLESS:-0}
      # X11 显示配置（GUI 模式）
      DISPLAY: ${DISPLAY}
      OMNI_KIT_ALLOW_ROOT: "1"
      # MuJoCo 渲染后端：NVIDIA 容器内默认用 EGL（无头），GUI 时可设 MUJOCO_GL=glfw
      MUJOCO_GL: ${MUJOCO_GL:-egl}
      # 避免一些 python 缓存污染 repo
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    volumes:
      # repo 挂载进去做开发（包含 third_party/instinct_rl 和 third_party/instinctlab）
      - ..:/workspace/myrl:rw
      # 推荐把大体积的 cache/log/checkpoints 放到宿主机独立目录
      - ${MYRL_WORKDIR:-${HOME}/myrl_work}:/workspace/myrl_work:rw
      # X11 socket（GUI 显示）
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    working_dir: /workspace/myrl

    # 如果需要远程查看训练日志，取消注释并指定端口
    ports:
      - "${LOG_SERVER_PORT:-7000}:7000"

    stdin_open: true
    tty: true

    entrypoint: ["/opt/myrl/entrypoint.sh"]
    command: ["bash"]
