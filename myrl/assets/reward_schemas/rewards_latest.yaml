terms:
  feet_air_time_biped:
    name: feet_air_time_biped
    module: myrl.tasks.locomotion.mdp.rewards.locomotion
    source_file: Ezio's_RL_Toolbox/myrl/src/myrl/tasks/locomotion/mdp/rewards/locomotion.py
    source_line: 99
    version: 1.0.0
    description: 双足最小空中时间奖励——促进抬脚行走
    long_description: '当脚离地时间超过 threshold 后奖励 (air_time - threshold)。

      落地时触发一次奖励（不是持续奖励），防止机器人滑步。'
    tags:
    - locomotion
    - gait
    - biped
    - contact
    params_schema:
      properties:
        foot_body_ids:
          description: 左右脚 body index（在 ContactSensor 中的索引）
          items:
            type: integer
          title: Foot Body Ids
          type: array
        threshold:
          default: 0.35
          description: 最小空中时间阈值（秒）；超过才给奖励
          maximum: 2.0
          minimum: 0.0
          title: Threshold
          type: number
          unit: s
        sensor_name:
          default: contact_forces
          description: ContactSensor 名称
          title: Sensor Name
          type: string
      required:
      - foot_body_ids
      title: FeetAirTimeBipedParams
      type: object
    output_description: scalar reward per environment (sum over two feet)
    author: ezio
    added_in: '2026-03-04'
  penalize_joint_torque_l2:
    name: penalize_joint_torque_l2
    module: myrl.tasks.locomotion.mdp.rewards.regularization
    source_file: Ezio's_RL_Toolbox/myrl/src/myrl/tasks/locomotion/mdp/rewards/regularization.py
    source_line: 28
    version: 1.0.0
    description: 关节力矩 L2 惩罚——降低能耗
    long_description: '-sum(tau²) over selected joints

      用负权重（如 -0.01）添加，鼓励节能步态。'
    tags:
    - regularization
    - energy
    - torque
    params_schema:
      properties:
        joint_ids:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          default: null
          description: 限定关节索引，None=所有关节
          title: Joint Ids
      title: PenalizeJointTorqueL2Params
      type: object
    output_description: non-positive scalar per environment (use negative weight)
    author: ezio
    added_in: '2026-03-04'
  penalize_lin_accel:
    name: penalize_lin_accel
    module: myrl.tasks.locomotion.mdp.rewards.regularization
